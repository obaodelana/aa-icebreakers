<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ice Breakers | Adullam Academy</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Plus+Jakarta+Sans:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <style>
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
            width: 100%;
        }

        .game-card {
            background: var(--color-cream);
            padding: 2rem;
            border-radius: var(--radius-md);
            border: 1px solid rgba(212, 168, 83, 0.2);
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-card:hover {
            border-color: var(--color-gold-500);
            background: white;
            transform: translateY(-5px);
            box-shadow: var(--shadow-soft);
        }

        .game-title {
            font-family: var(--font-heading);
            font-size: 1.2rem;
            color: var(--color-navy-900);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .game-desc {
            font-size: 0.85rem;
            opacity: 0.7;
            line-height: 1.5;
            color: var(--color-navy-800);
        }

        .placeholder-card {
            opacity: 0.5;
            border-style: dashed;
            cursor: default;
        }

        .placeholder-card:hover {
            transform: none;
            background: var(--color-cream);
            border-color: rgba(212, 168, 83, 0.2);
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="https://adullamacademy.com/logos/logo.png" alt="Adullam Academy">
        </div>
        <h1>Ice Breakers</h1>
        <div class="subtitle">SELECT A MISSION</div>
        
        <div class="game-grid">
            <a href="games/emoji-algorithm/index.html" class="game-card">
                <div class="game-title">Emoji Algorithm</div>
                <div class="game-desc">Decrypt Bible stories, characters, and events from emoji strings.</div>
            </a>
            <div class="game-card placeholder-card">
                <div class="game-title">Invention Lab</div>
                <div class="game-desc">Coming Soon: Design futuristic Kingdom-powered innovations.</div>
            </div>
        </div>
    </div>
</body>
</html>
