<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cohort Quiz | Adullam Academy</title>
    <link rel="icon" type="image/png" href="../../favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Plus+Jakarta+Sans:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../global.css">
    <link rel="stylesheet" href="app.css">
</head>
<body>

    <div class="container">
        <a href="../../index.html" class="back-home">← Home</a>
        <div class="logo">
            <img src="https://adullamacademy.com/logos/logo.png" alt="Adullam Academy">
        </div>

        <!-- Game Screen -->
        <div id="game-screen">
            <h1>Cohort Quiz</h1>
            <div class="subtitle">TEST YOUR KNOWLEDGE</div>
            <div class="score-display" id="score-display">Score: 0</div>

            <div class="question-text" id="question-text">Loading...</div>
            <div class="options-container" id="options-container"></div>

            <div class="controls">
                <button class="btn-primary" onclick="nextSlide()" id="next-btn" disabled style="opacity: 0.5;">NEXT</button>
            </div>

            <div class="progress" id="progress">Question 1 of 10</div>
        </div>

        <!-- Completion Screen -->
        <div id="completion-screen">
            <div class="celebration-emoji">🎓✨🙌</div>
            <h1>Mission Complete!</h1>
            <div class="subtitle" style="margin-bottom: 0.5rem;">Here's how you did:</div>
            <div class="final-score-label">YOUR SCORE</div>
            <div class="final-score-value" id="final-score">0/10</div>
            <button class="btn-primary" onclick="restartGame()">PLAY AGAIN</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
